<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Page Not Found | KeyLaunch</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body class="plain-page" data-page-title="pageTitle404">
    <main class="success-wrap">
      <select class="language-select result-language" data-language-select aria-label="Language">
        <option value="en">English</option>
        <option value="zh-CN">简体中文</option>
        <option value="zh-TW">繁體中文</option>
      </select>
      <section class="result-panel">
        <p class="eyebrow">404</p>
        <h1 data-i18n="notFoundTitle">Page not found.</h1>
        <p data-i18n="notFoundCopy">The page you requested does not exist.</p>
        <a class="button primary" href="/" data-i18n="backToStore">Back to store</a>
      </section>
    </main>
    <script type="module" src="/page.js"></script>
  </body>
</html>
