<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Checkout Canceled | KeyLaunch</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body class="plain-page" data-page-title="pageTitleCancel">
    <main class="success-wrap">
      <a class="brand success-brand" href="/">
        <span class="brand-mark">K</span>
        <span>KeyLaunch</span>
      </a>
      <select class="language-select result-language" data-language-select aria-label="Language">
        <option value="en">English</option>
        <option value="zh-CN">简体中文</option>
        <option value="zh-TW">繁體中文</option>
      </select>
      <section class="result-panel">
        <p class="eyebrow" data-i18n="cancelEyebrow">Checkout canceled</p>
        <h1 data-i18n="cancelTitle">No payment was taken.</h1>
        <p data-i18n="cancelCopy">You can return to the plans and choose an API key whenever you are ready.</p>
        <a class="button primary" href="/#plans" data-i18n="viewPlans">View plans</a>
      </section>
    </main>
    <script type="module" src="/page.js"></script>
  </body>
</html>
